name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install NDK
        run: |
          yes | sdkmanager "ndk;28.2.13676358" >/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Build FFmpeg audio decoders (AC-3 / E-AC-3 / DTS / TrueHD / …)
        # The market/Play build links these (built locally via this script); CI previously did NOT,
        # so GitHub-release APKs played AC-3/DTS files as "no audio". Build them here so the
        # GitHub APK matches the Play build. Adds a few minutes (4 ABIs).
        run: bash scripts/setup_media3_ffmpeg.sh --host linux-x86_64 --abi 21

      - name: Download and extract VITURE SDK
        # The VITURE One SDK .aar is fetched at build time (not committed — no redistribution)
        # and dropped into app/libs, where the fileTree dependency picks it up.
        run: |
          curl -L -o viture_sdk.tar.xz https://static.viture.dev/external-file/sdk/viture_android_sdk_v1.0.7.tar.xz
          tar -xf viture_sdk.tar.xz
          mkdir -p app/libs
          cp aar/VITURE-SDK-1.0.7.aar app/libs/

      - name: Decode keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/keystore.jks"
          echo "ANDROID_KEYSTORE_PATH=$GITHUB_WORKSPACE/keystore.jks" >> $GITHUB_ENV

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          TAG="${GITHUB_REF_NAME:-dev}"
          mv app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/XPlayer2-${TAG}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: XPlayer2-${{ github.ref_name }}
          path: app/build/outputs/apk/release/XPlayer2-*.apk

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: app/build/outputs/apk/release/XPlayer2-*.apk
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
